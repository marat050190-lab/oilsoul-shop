<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oil&Soul</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="page-catalog">
    <header>
      <div class="lang-switcher">
        <button id="lang-ru" class="lang-btn lang-active" onclick="setLang('ru')">RU</button>
        <button id="lang-en" class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
      <h1>🎨 Oil&Soul</h1>
      <p>Картины маслом в стиле Telegram</p>
    </header>
    <main>
      <div id="catalog" class="catalog"></div>
    </main>
    <div id="cart-bar" class="cart-bar hidden">
      <span id="cart-info">0 товаров</span>
      <button id="checkout-btn">Оформить заказ →</button>
    </div>
  </div>

  <div id="page-detail" class="hidden"></div>

  <div id="page-checkout" class="hidden">
    <header>
      <button id="back-btn">← Назад</button>
      <h1>Оформление заказа</h1>
    </header>
    <div class="checkout-form">
      <div id="order-summary" class="order-summary"></div>
      <div class="form-section">
        <h3>📦 Данные для доставки</h3>
        <input type="text" id="field-name" placeholder="Имя и фамилия *" autocomplete="name" required>
        <div class="autocomplete-wrap">
          <input type="text" id="field-country" placeholder="Страна *" autocomplete="off" required>
          <div class="autocomplete-list" id="list-country"></div>
        </div>
        <div class="autocomplete-wrap">
          <input type="text" id="field-city" placeholder="Город *" autocomplete="off" required>
          <div class="autocomplete-list" id="list-city"></div>
        </div>
        <div class="autocomplete-wrap">
          <input type="text" id="field-address" placeholder="Адрес (улица, дом, квартира) *" autocomplete="off" required>
          <div class="autocomplete-list" id="list-address"></div>
        </div>
        <input type="text" id="field-postal" placeholder="Почтовый индекс *" autocomplete="postal-code" required>
        <input type="tel" id="field-phone" placeholder="Телефон *" autocomplete="tel" required>
        <input type="email" id="field-email" placeholder="Email *" autocomplete="email" required>
        <textarea id="field-comment" placeholder="Комментарий к заказу (необязательно)" autocomplete="off"></textarea>
      </div>
      <div class="form-section">
        <h3>💎 Оплата</h3>
        <div class="payment-info">
          <p>Переведите <strong id="ton-amount"></strong> TON на адрес:</p>
          <div class="ton-address" id="ton-address-display"></div>
          <p class="payment-note">После оплаты нажмите кнопку ниже и пришлите скриншот транзакции боту</p>
        </div>
      </div>
      <button id="submit-btn" class="submit-btn">✅ Подтвердить заказ</button>
    </div>
  </div>

  <script src="products.js"></script>
  <script src="app.js"></script>
  <script>
    let acTimer = null;

    async function nominatimSearch(query, type) {
      if (query.length < 2) return [];
      try {
        const params = new URLSearchParams({
          q: query,
          format: 'json',
          addressdetails: 1,
          limit: 5,
          'accept-language': 'ru,en'
        });
        const res = await fetch(`https://nominatim.openstreetmap.org/search?${params}`, {
          headers: { 'Accept-Language': 'ru,en' }
        });
        return await res.json();
      } catch (e) {
        return [];
      }
    }

    function showList(listId, items, onSelect) {
      const list = document.getElementById(listId);
      list.innerHTML = '';
      if (!items.length) { list.style.display = 'none'; return; }
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'autocomplete-item';
        div.textContent = item.display_name;
        div.addEventListener('mousedown', (e) => {
          e.preventDefault();
          onSelect(item);
          list.style.display = 'none';
        });
        list.appendChild(div);
      });
      list.style.display = 'block';
    }

    function hideAllLists() {
      document.querySelectorAll('.autocomplete-list').forEach(l => l.style.display = 'none');
    }

    document.getElementById('field-country').addEventListener('input', function() {
      clearTimeout(acTimer);
      acTimer = setTimeout(async () => {
        const results = await nominatimSearch(this.value, 'country');
        showList('list-country', results, (item) => {
          document.getElementById('field-country').value = item.address.country || item.display_name;
        });
      }, 400);
    });

    document.getElementById('field-city').addEventListener('input', function() {
      clearTimeout(acTimer);
      acTimer = setTimeout(async () => {
        const results = await nominatimSearch(this.value, 'city');
        showList('list-city', results, (item) => {
          const addr = item.address;
          document.getElementById('field-city').value = addr.city || addr.town || addr.village || this.value;
          if (addr.country) document.getElementById('field-country').value = addr.country;
          if (addr.postcode) document.getElementById('field-postal').value = addr.postcode;
        });
      }, 400);
    });

    document.getElementById('field-address').addEventListener('input', function() {
      clearTimeout(acTimer);
      const city = document.getElementById('field-city').value;
      const query = city ? `${this.value}, ${city}` : this.value;
      acTimer = setTimeout(async () => {
        const results = await nominatimSearch(query, 'address');
        showList('list-address', results, (item) => {
          const addr = item.address;
          const road = addr.road || '';
          const house = addr.house_number || '';
          document.getElementById('field-address').value = house ? `${road}, ${house}` : road || item.display_name;
          if (addr.city || addr.town) document.getElementById('field-city').value = addr.city || addr.town;
          if (addr.country) document.getElementById('field-country').value = addr.country;
          if (addr.postcode) document.getElementById('field-postal').value = addr.postcode;
        });
      }, 500);
    });

    document.addEventListener('click', hideAllLists);
  </script>
</body>
</html>
